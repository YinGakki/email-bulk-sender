{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>撰写邮件</h1>
</div>

<div class="card">
    <h3 style="margin-bottom: 20px;">选择收件人</h3>
    <div class="toolbar">
        <input type="text" id="search-input" placeholder="搜索姓名或邮箱..." style="padding: 10px; width: 250px;" onkeyup="searchContacts()">
        <button class="btn btn-secondary" onclick="toggleSelectAll()">全选/取消</button>
    </div>
    <table id="contacts-table">
        <thead>
            <tr>
                <th><input type="checkbox" id="select-all-checkbox" onchange="toggleSelectAll()"></th>
                <th>姓名</th>
                <th>邮箱</th>
                <th>公司</th>
            </tr>
        </thead>
        <tbody id="contacts-list"></tbody>
    </table>
    <div class="contact-list" id="contact-list-mobile"></div>
    <div id="empty-state" class="empty-state" style="display: none;">
        <div style="font-size: 48px;">📭</div>
        <div>暂无联系人，请先在"联系人"页面添加</div>
    </div>
    <div style="margin-top: 15px; color: #666;">
        已选择 <strong id="selected-count">0</strong> 个收件人
    </div>
</div>

<div class="card">
    <h3 style="margin-bottom: 20px;">邮件内容</h3>
    
    <div class="toolbar">
        <select id="template-select" onchange="loadTemplate()" style="padding: 10px; min-width: 200px;">
            <option value="">-- 选择模板 --</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>邮件主题</label>
        <input type="text" id="email-subject" placeholder="可用变量：{{姓名}}、{{公司}} 等">
    </div>
    
    <div class="form-group">
        <label>邮件内容（HTML格式）</label>
        <textarea id="email-content" placeholder="支持HTML格式和变量，如：&#10;<p>尊敬的{{姓名}}：</p>&#10;<p>您好！...</p>"></textarea>
    </div>

    <div class="form-group">
        <label>附件</label>
        <input type="file" id="email-attachments" multiple onchange="updateAttachmentList()">
        <div id="attachment-list" style="margin-top: 8px; font-size: 13px; color: #666;"></div>
    </div>

    <div class="form-group">
        <label>发送方式</label>
        <div class="checkbox-group" style="margin-bottom: 8px;">
            <input type="radio" name="send-mode" id="send-separately" value="true" checked>
            <label for="send-separately" style="display: inline; margin-bottom: 0; font-weight: normal;">
                <strong>分别发送</strong> — 每位收件人单独收到一封邮件，互不可见（推荐）
            </label>
        </div>
        <div class="checkbox-group">
            <input type="radio" name="send-mode" id="send-group" value="false">
            <label for="send-group" style="display: inline; margin-bottom: 0; font-weight: normal;">
                <strong>群发</strong> — 一封邮件同时发送给所有收件人
            </label>
        </div>
    </div>

    <button class="btn btn-success" onclick="sendEmails()" style="width: 100%; padding: 15px;">发送邮件</button>
</div>
{% endblock %}

{% block scripts %}
<script>
let contacts = [];
let templates = [];
let selectedIds = [];

async function loadData() {
    contacts = await api('/api/contacts');
    templates = await api('/api/templates');
    
    // 填充模板下拉
    const select = document.getElementById('template-select');
    templates.forEach(t => {
        const option = document.createElement('option');
        option.value = t.id;
        option.textContent = t.name;
        select.appendChild(option);
    });
    
    renderContacts();
}

function renderContacts(filtered = null) {
    const list = filtered || contacts;
    const tbody = document.getElementById('contacts-list');
    const mobileList = document.getElementById('contact-list-mobile');

    if (list.length === 0) {
        tbody.innerHTML = '';
        mobileList.innerHTML = '';
        document.getElementById('empty-state').style.display = 'block';
        return;
    }

    document.getElementById('empty-state').style.display = 'none';

    tbody.innerHTML = list.map(c => `
        <tr>
            <td><input type="checkbox" value="${c.id}" onchange="toggleSelect(${c.id})" ${selectedIds.includes(c.id) ? 'checked' : ''}></td>
            <td>${c.name}</td>
            <td>${c.email}</td>
            <td>${c.company || '-'}</td>
        </tr>
    `).join('');

    mobileList.innerHTML = list.map(c => `
        <div class="contact-item">
            <div style="padding-top: 3px;">
                <input type="checkbox" value="${c.id}" onchange="toggleSelect(${c.id})" ${selectedIds.includes(c.id) ? 'checked' : ''}>
            </div>
            <div class="contact-info">
                <div class="name">${c.name}</div>
                <div class="email">${c.email}</div>
                <div class="extra">${c.company ? '公司：' + c.company : ''}</div>
            </div>
        </div>
    `).join('');

    updateSelectedCount();
}

function searchContacts() {
    const keyword = document.getElementById('search-input').value.toLowerCase();
    if (!keyword) return renderContacts();
    
    const filtered = contacts.filter(c => 
        c.name.toLowerCase().includes(keyword) || 
        c.email.toLowerCase().includes(keyword)
    );
    renderContacts(filtered);
}

function toggleSelectAll() {
    const checkbox = document.getElementById('select-all-checkbox');
    const keyword = document.getElementById('search-input').value.toLowerCase();
    const list = keyword ? contacts.filter(c => 
        c.name.toLowerCase().includes(keyword) || 
        c.email.toLowerCase().includes(keyword)
    ) : contacts;
    
    if (checkbox.checked) {
        selectedIds = list.map(c => c.id);
    } else {
        selectedIds = [];
    }
    renderContacts(keyword ? list : null);
}

function toggleSelect(id) {
    if (selectedIds.includes(id)) {
        selectedIds = selectedIds.filter(i => i !== id);
    } else {
        selectedIds.push(id);
    }
    updateSelectedCount();
}

function updateSelectedCount() {
    document.getElementById('selected-count').textContent = selectedIds.length;
}

function loadTemplate() {
    const templateId = parseInt(document.getElementById('template-select').value);
    if (!templateId) return;
    
    const template = templates.find(t => t.id === templateId);
    if (template) {
        document.getElementById('email-subject').value = template.subject;
        document.getElementById('email-content').value = template.content;
    }
}

function updateAttachmentList() {
    const input = document.getElementById('email-attachments');
    const list = document.getElementById('attachment-list');
    if (input.files.length === 0) {
        list.innerHTML = '';
        return;
    }
    const files = Array.from(input.files);
    const totalSize = files.reduce((sum, f) => sum + f.size, 0);
    list.innerHTML = files.map(f => `📎 ${f.name} (${formatFileSize(f.size)})`).join('<br>') +
        `<br><small>共 ${files.length} 个文件，总计 ${formatFileSize(totalSize)}</small>`;
}

function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function sendEmails() {
    const subject = document.getElementById('email-subject').value.trim();
    const content = document.getElementById('email-content').value.trim();
    const sendSeparately = document.querySelector('input[name="send-mode"]:checked').value === 'true';
    const fileInput = document.getElementById('email-attachments');

    if (selectedIds.length === 0) {
        showAlert('请选择收件人', 'danger');
        return;
    }

    if (!subject || !content) {
        showAlert('主题和内容不能为空', 'danger');
        return;
    }

    const modeText = sendSeparately ? '分别发送' : '群发';
    if (!confirm(`确定要以「${modeText}」方式发送邮件给 ${selectedIds.length} 个收件人吗？`)) return;

    const formData = new FormData();
    formData.append('contact_ids', selectedIds.join(','));
    formData.append('subject', subject);
    formData.append('content', content);
    formData.append('send_separately', sendSeparately);

    for (let i = 0; i < fileInput.files.length; i++) {
        formData.append('attachments', fileInput.files[i]);
    }

    showLoading();
    try {
        const response = await fetch('/api/tasks', {
            method: 'POST',
            body: formData
        });
        const result = await response.json();
        hideLoading();

        if (result.success) {
            showAlert('发送任务已创建，请到"任务"页面查看进度', 'success');
            setTimeout(() => window.location.href = '/tasks', 2000);
        } else {
            showAlert('创建任务失败: ' + result.error, 'danger');
        }
    } catch (error) {
        hideLoading();
        showAlert('请求失败: ' + error.message, 'danger');
    }
}

loadData();
</script>
{% endblock %}
